  to = "/guides/frontmatter-properties/"
  status = 301

# Settings Search plugin removed: Obsidian 1.13 ships a built-in global settings search.
[[redirects]]
  from = "/plugins/settings-search"
  to = "/guides/introduction/"
  status = 301

[[redirects]]
  from = "/plugins/settings-search/"
  to = "/guides/introduction/"
